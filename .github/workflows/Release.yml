name: Release

on:
  push:
    tags:
      - 'v1.0'

permissions:
  contents: write

jobs:
  publish-release:
    name: Package and Publish Build
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository Source
        uses: actions/checkout@v4

      - name: Generate Official Release Entry
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: "Release v1.0"
          body: |
            ## Production Build 1.0

            ### Installation Steps
            1. Download the WinACTRwizard.msi package attached below.
            2. Launch the downloaded MSI installer.
            3. Choose your desired installation directory path during setup.
            4. Navigate to the directory where you installed the program. The folder name will be "winactr".
            5. Launch the executable inside named "winactr.exe".

            ### How to Create a MACF Agent File
            1. Create a root folder using any name of your choice.
            2. Inside that root folder, create a subfolder named "act 1". This folder is designated for your agent's idle animations.
            3. Create additional subfolders named "act 2", "act 3", etc., for regular animations like waving or moving.
            4. Place your image assets (such as PNG or WebP files) directly into these act folders.
            5. To define how long each animation plays (excluding the "act 1" idle animation), create a "config.ini" file inside the respective act folder. Inside the INI file, specify the duration (e.g., "1s" or your preferred number of seconds).
            6. Launch "winactr.exe". The application will automatically open to the Compiler tab.
            7. Click "Browse" and select your root asset folder.
            8. Click "Compile" to generate the file.
            9. Switch to the execution tab (the tab that is not labeled "Decompile MACF") and click the "Launch MACF" button.
            10. Browse for the compiled file inside your project folder (it will be named "agent.macf") and select it to launch. A separate window will appear displaying your animated agent.

            *Note: This program is strictly designed to compile MACF agent files, similar to MS Agent or DoubleAgent format structures.*
          draft: false
          prerelease: false
          files: |
            WinACTRwizard.msi
